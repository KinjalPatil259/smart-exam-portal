{% extends 'base.html' %}
{% block title %}My Profile - SmartExam{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto; padding: 20px 0; animation: fadeInUp 0.5s ease;">
    <div class="glass-panel">
        <h2 style="font-size: 2rem; margin-bottom: 25px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            Profile Settings
        </h2>
        
        <form action="{{ url_for('auth.profile') }}" method="POST" enctype="multipart/form-data">
            <!-- Profile Avatar Section -->
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--input-bg); border: 2px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                    {% if student.avatar_url %}
                        <img src="{{ url_for('static', filename=student.avatar_url) }}" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
                    {% else %}
                        👨‍🎓
                    {% endif %}
                </div>
                <div>
                    <label for="avatar" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px;">Profile Photo</label>
                    <input type="file" id="avatar" name="avatar" accept="image/*" style="font-size: 0.85rem; color: var(--text-secondary);">
                    <small style="display: block; color: var(--text-muted); margin-top: 4px; font-size: 0.75rem;">Supported: JPG, PNG, WEBP. Max 2MB.</small>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" class="form-control" value="{{ student.name }}" required>
                </div>

                <!-- Email (Readonly) -->
                <div class="form-group">
                    <label>Email Address (Account Username)</label>
                    <input type="email" class="form-control" value="{{ current_user.email }}" readonly style="cursor: not-allowed; opacity: 0.7;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <!-- Roll Number (Readonly) -->
                <div class="form-group">
                    <label>Roll Number / Student ID</label>
                    <input type="text" class="form-control" value="{{ student.roll_number }}" readonly style="cursor: not-allowed; opacity: 0.7;">
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" class="form-control" value="{{ student.phone or '' }}" placeholder="+1234567890">
                </div>
            </div>

            <!-- Department -->
            <div class="form-group">
                <label for="department">Department / Branch</label>
                <input type="text" id="department" name="department" class="form-control" value="{{ student.department or '' }}" placeholder="Computer Science & Engineering">
            </div>

            <!-- Bio -->
            <div class="form-group">
                <label for="bio">Biography</label>
                <textarea id="bio" name="bio" class="form-control" rows="4" placeholder="Brief statement...">{{ student.bio or '' }}</textarea>
            </div>
            
            <hr style="border: 0; height: 1px; background: var(--glass-border); margin: 35px 0;">
            
            <h3 style="font-size: 1.3rem; margin-bottom: 20px; color: var(--text-primary);">Change Password</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Leave blank to keep current">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter new password">
                </div>
            </div>
            
            <!-- Actions -->
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
